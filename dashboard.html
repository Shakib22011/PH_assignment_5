<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title and logo -->
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom css -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div
        class="flex justify-between navbar bg-base-100 shadow-sm py-4 px-4 lg:px-15"
      >
        <div class="flex gap-2 items-center">
          <img src="./assets/github-logo_25231 1.png" alt="" />
          <h2 class="text-2xl font-bold">GitHub Issue Tracker</h2>
        </div>

        <div class="flex gap-2">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues...." />
          </label>
          <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>New Issue
          </button>
        </div>
      </div>
    </header>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="modal_container" class="bg-white space-y-4"></div>

        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <main class="max-w-10/12 mx-auto mt-15">
      <section
        class="hero_buttons flex gap-3 shadow-lg border border-gray-200 rounded-md py-2 px-4 mb-6"
      >
        <button id="allbutton" class="tab-button btn">All</button>
        <button id="openbutton" class="tab-button btn">Open</button>
        <button id="closebutton" class="tab-button btn">Closed</button>
      </section>

      <section
        class="issue-bar shadow-lg border border-gray-200 rounded-md py-2 px-4 flex justify-between"
      >
        <div class="flex gap-3 items-center">
          <img
            class="bg-indigo-200 p-1.5 rounded-full"
            src="./assets/Aperture.png"
            alt=""
          />
          <div>
            <h2 class="font-semibold text-lg">
              <span id="count">50</span> Issues
            </h2>
            <p class="text-neutral/60">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <img src="./assets/Ellipse 2.png" alt="" />
          <p class="mr-2">Open</p>
          <img src="./assets/Ellipse 2 (1).png" alt="" />
          <p>Closed</p>
        </div>
      </section>

      <section id="spinner" class="flex justify-center items-center py-10 hidden">
      <span class="loading loading-dots loading-xl"></span>
    </section>

      <section
        id="issue-container"
        class="bg-gray-100 grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 p-5 rounded-lg gap-3"
      ></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
