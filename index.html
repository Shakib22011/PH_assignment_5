<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title and logo -->
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom css -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="min-h-screen login flex justify-center items-center">
      <fieldset
        class="fieldset bg-base-200 shadow-2xl rounded-box w-xs md:w-lg  p-8"
      >
        <div class="icon mx-auto mb-4">
          <img src="./assets/github-logo.png" alt="" />
        </div>
        <h3 class="text-center text-2xl font-semibold">GitHub Issue Tracker</h3>
        <p class="text-center text-neutral/70">Sign in to manage your issues</p>
        <label class="label">Username</label>
        <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
        <span class="text-indigo-500 mb-4">Default: admin</span>

        <label class="label">Password</label>
        <input id="password" type="password" class="input w-full" value="admin123" placeholder="Enter Password" />
        <span class="text-indigo-500 mb-4">Default: admin123</span>

        <button onclick="signin()" class="btn btn-primary mt-4">Sign in</button>
        <div class="divider">OR</div>
        <div>
          <p class="text-center text-neutral/50 mb-4">Demo Credentials:</p>
          <div class="demo bg-gray-200 text-center p-8 rounded-lg">
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
          </div>
        </div>
      </fieldset>
    </div>

    <script src="login.js"></script>
  </body>
</html>
